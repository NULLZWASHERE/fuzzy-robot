<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Redwing Scripts Hub</title>

<style>
body {
    margin: 0;
    font-family: Inter, Arial, sans-serif;
    background: radial-gradient(circle at top, #120000, #050000);
    color: white;
}

/* top bar */
header {
    display: flex;
    gap: 10px;
    padding: 15px;
    background: rgba(20,0,0,0.75);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid #330000;
}

/* inputs */
input, select {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #330000;
    background: #140000;
    color: white;
    outline: none;
}

input:focus, select:focus {
    border-color: #ff2b2b;
    box-shadow: 0 0 10px rgba(255,0,0,0.3);
}

/* grid */
.container {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 15px;
}

/* card */
.card {
    background: linear-gradient(145deg, #1a0000, #0b0000);
    border: 1px solid #2a0000;
    border-radius: 14px;
    padding: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.6);
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-3px);
    border-color: #ff2b2b;
    box-shadow: 0 0 18px rgba(255,0,0,0.25);
}

/* text */
.title {
    font-size: 16px;
    font-weight: 800;
    color: #ff3b3b;
}

.desc {
    font-size: 13px;
    opacity: 0.8;
    margin-top: 6px;
}

.category {
    margin-top: 8px;
    font-size: 12px;
    color: #ff6b6b;
}

/* script box */
.content {
    margin-top: 10px;
    font-size: 11px;
    background: #0a0000;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #2a0000;
    white-space: pre-wrap;
}

/* execute button */
button {
    margin-top: 10px;
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #ff0000, #b30000);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    box-shadow: 0 0 15px rgba(255,0,0,0.5);
    transform: scale(1.02);
}

.error {
    padding: 20px;
    color: red;
}
</style>
</head>

<body>

<header>
    <input id="search" placeholder="Search scripts..." />
    <select id="filter">
        <option value="all">All</option>
        <option value="visual">Visual</option>
        <option value="combat">Combat</option>
        <option value="admin">Admin</option>
    </select>
</header>

<div id="container" class="container"></div>

<script>
let scriptsData = [];

async function loadScripts() {
    try {
        const res = await fetch("https://redwingapi.infodmca.org/scripts.txt");
        const data = await res.json();
        scriptsData = data.scripts;
        render();
    } catch (err) {
        document.getElementById("container").innerHTML =
            `<div class="error">Failed to load API: ${err.message}</div>`;
    }
}

function executeScript(script) {
    // UI hook only (no unsafe execution)
    console.log("Execute:", script);

    alert("Executing:\n" + script.name);
}

function render() {
    const search = document.getElementById("search").value.toLowerCase();
    const filter = document.getElementById("filter").value;

    const container = document.getElementById("container");
    container.innerHTML = "";

    const filtered = scriptsData.filter(s => {
        return (
            (filter === "all" || s.category === filter) &&
            (s.name.toLowerCase().includes(search) ||
             s.description.toLowerCase().includes(search))
        );
    });

    filtered.forEach(script => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <div class="title">${script.name}</div>
            <div class="desc">${script.description}</div>
            <div class="category">${script.category}</div>
            <div class="content">${script.content}</div>
            <button onclick='executeScript(${JSON.stringify(script)})'>
                EXECUTE
            </button>
        `;

        container.appendChild(card);
    });
}

document.getElementById("search").addEventListener("input", render);
document.getElementById("filter").addEventListener("change", render);

loadScripts();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Redwing Scripts Hub</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0b0b10;
        color: #fff;
    }

    header {
        padding: 15px;
        background: #111;
        display: flex;
        gap: 10px;
        align-items: center;
    }

    input, select {
        padding: 10px;
        border: none;
        border-radius: 8px;
        background: #1a1a22;
        color: white;
        outline: none;
    }

    .container {
        padding: 20px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 15px;
    }

    .card {
        background: #151522;
        padding: 15px;
        border-radius: 12px;
        border: 1px solid #222;
    }

    .title {
        font-size: 16px;
        font-weight: bold;
    }

    .desc {
        font-size: 13px;
        opacity: 0.8;
        margin-top: 5px;
    }

    .category {
        margin-top: 8px;
        font-size: 12px;
        color: #7aa2ff;
    }

    .content {
        margin-top: 10px;
        font-size: 11px;
        background: #0d0d14;
        padding: 8px;
        border-radius: 8px;
        white-space: pre-wrap;
        overflow-x: auto;
    }

    .error {
        padding: 20px;
        color: red;
    }
</style>
</head>

<body>

<header>
    <input id="search" placeholder="Search scripts..." />
    <select id="filter">
        <option value="all">All</option>
        <option value="visual">Visual</option>
        <option value="combat">Combat</option>
        <option value="admin">Admin</option>
    </select>
</header>

<div id="container" class="container"></div>

<script>
let scriptsData = [];

// 🔥 FETCH FROM YOUR API
async function loadScripts() {
    try {
        const res = await fetch("https://redwingapi.infodmca.org/scripts.txt");

        if (!res.ok) {
            throw new Error("HTTP Error: " + res.status);
        }

        const data = await res.json();

        if (!data.success || !Array.isArray(data.scripts)) {
            throw new Error("Invalid API response format");
        }

        scriptsData = data.scripts;
        render();

    } catch (err) {
        document.getElementById("container").innerHTML =
            `<div class="error">Failed to load scripts: ${err.message}</div>`;
    }
}

function render() {
    const search = document.getElementById("search").value.toLowerCase();
    const filter = document.getElementById("filter").value;

    const container = document.getElementById("container");
    container.innerHTML = "";

    const filtered = scriptsData.filter(s => {
        return (
            (filter === "all" || s.category === filter) &&
            (s.name.toLowerCase().includes(search) ||
             s.description.toLowerCase().includes(search))
        );
    });

    if (filtered.length === 0) {
        container.innerHTML = "<div class='error'>No scripts found</div>";
        return;
    }

    filtered.forEach(script => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <div class="title">${script.name}</div>
            <div class="desc">${script.description}</div>
            <div class="category">Category: ${script.category}</div>
            <div class="content">${script.content}</div>
        `;

        container.appendChild(card);
    });
}

document.getElementById("search").addEventListener("input", render);
document.getElementById("filter").addEventListener("change", render);

loadScripts();
</script>

</body>
</html>
